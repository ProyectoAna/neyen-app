.logo-mark {

}

/* ===== SCREENS ===== */
.screen {
  flex: 1;

  flex-direction: column;

.intro-block p {

.date-form {

.date-inputs {
  display: flex;

.date-field {

.date-field label {

  font-weight: 500;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.date-field input,
.date-field select {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: var(--text-base);
  font-weight: 500;
  color: var(--color-text);
  text-align: center;

}

.date-field input::placeholder {

}

.date-field input::-webkit-outer-spin-button,
.date-field input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.date-field input:focus,
.date-field select:focus {

  box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
}

.btn-primary {

  align-items: center;
  justify-content: center;

  padding: var(--space-4) var(--space-8);

  color: #0f0f0e;
  font-family: var(--font-display);
  font-size: var(--text-sm);

.btn-primary:hover {

}

.btn-primary:active {

}

.btn-primary:disabled {

}

.error-msg {

.result-block {

.result-label {

.root-name {

.card-today {
  width: 100%;
  max-width: 420px;

}

.card-today::before {

  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--color-gold), var(--color-green));
}

.card-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}

.card-icon {

}

.card-title {

}

.card-date {

}

.card-message {

  color: var(--color-text);
  line-height: 1.7;
  margin-bottom: var(--space-6);
}

.card-reflection {

.btn-back {

  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-5);

  font-weight: 500;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
}

.btn-back:hover {
  color: var(--color-text);
  border-color: var(--color-text-muted);
}

/* ===== FOOTER ===== */
.app-footer {
  padding: var(--space-4) var(--space-6);
  text-align: center;
  border-top: 1px solid var(--color-divider);
}

.app-footer a {

  color: var(--color-text-faint);
  text-decoration: none;
}

.app-footer a:hover {

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}

.animate-fade-up {
  animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.animate-scale-in {
  animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .app-header { padding: var(--space-3) var(--space-4); }
  .screen { padding: var(--space-6) var(--space-4); }
  .card-today { padding: var(--space-6); }
  .date-inputs { gap: var(--space-2); }
}

/* Install prompt */
.install-prompt {
  display: none;

  bottom: var(--space-6);
  left: 50%;

}

.install-prompt.visible { display: block; }

.install-prompt p {
  font-size: var(--text-sm);
  color: var(--color-text);
  margin-bottom: var(--space-3);
}

.install-actions {
  display: flex;
  gap: var(--space-3);
  justify-content: center;
}

.btn-install {
  padding: var(--space-2) var(--space-5);
  background: var(--color-gold);
  color: #0f0f0e;
  font-weight: 600;
  font-size: var(--text-sm);
  border-radius: var(--radius-md);
}

.btn-dismiss {
  padding: var(--space-2) var(--space-5);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}
</style>

<script>
/* ===== THEME TOGGLE ===== */
(function(){
  const toggle = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  root.setAttribute('data-theme', theme);
  updateToggleIcon();

  toggle.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    toggle.setAttribute('aria-label', 'Cambiar a modo ' + (theme === 'dark' ? 'claro' : 'oscuro'));
    updateToggleIcon();
  });

  function updateToggleIcon() {
    toggle.innerHTML = theme === 'dark'
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'

/* ===== NEYĒN ROOT NUMBER CALCULATION ===== */
function calculateRoot(day, month, year) {
  const digits = String(day) + String(month) + String(year);
  let sum = digits.split('').reduce((a, d) => a + parseInt(d, 10), 0);
  while (sum > 9) {
    sum = String(sum).split('').reduce((a, d) => a + parseInt(d, 10), 0);
  }
  return sum;
}

/* ===== DAILY CARD SELECTION ===== */
function getDailyCard(rootNum) {
  const today = new Date();
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
  const seed = (dayOfYear + rootNum) % 3;
  return rootData[rootNum].messages[seed];
}

function formatDate(date) {
  const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
  const months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
  return `${days[date.getDay()]}, ${date.getDate()} de ${months[date.getMonth()]} de ${date.getFullYear()}`;
}

/* ===== FORM HANDLING ===== */
const form = document.getElementById('birthForm');
const dayInput = document.getElementById('birth-day');
const monthInput = document.getElementById('birth-month');
const yearInput = document.getElementById('birth-year');
const errorMsg = document.getElementById('errorMsg');
const screenBirth = document.getElementById('screen-birth');
const screenResult = document.getElementById('screen-result');

form.addEventListener('submit', (e) => {
  e.preventDefault();
  errorMsg.textContent = '';

  const day = parseInt(dayInput.value, 10);
  const month = parseInt(monthInput.value, 10);
  const year = parseInt(yearInput.value, 10);

  // Validate
  if (!day || !month || !year) {
    errorMsg.textContent = 'Completa todos los campos.';
    return;
  }

  if (year < 1920 || year > 2025) {
    errorMsg.textContent = 'Introduce un año entre 1920 y 2025.';
    return;
  }

  // Check valid date
  const testDate = new Date(year, month - 1, day);
  if (testDate.getDate() !== day || testDate.getMonth() !== month - 1) {
    errorMsg.textContent = 'Esa fecha no existe. Revisa el día.';
    return;
  }

  // Calculate
  const root = calculateRoot(day, month, year);
  const data = rootData[root];
  const card = getDailyCard(root);

  // Populate result screen
  document.getElementById('rootNumber').textContent = root;
  document.getElementById('rootName').textContent = data.name;
  document.getElementById('cardDate').textContent = formatDate(new Date());
  document.getElementById('cardMessage').textContent = card.text;
  document.getElementById('cardReflection').textContent = '\u2192 ' + card.reflection;

  // Switch screens
  screenBirth.setAttribute('aria-hidden', 'true');
  screenResult.setAttribute('aria-hidden', 'false');

  // Re-trigger animations
  screenResult.querySelectorAll('[class*="animate-"]').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
});

// Back button
document.getElementById('btnBack').addEventListener('click', () => {
  screenResult.setAttribute('aria-hidden', 'true');
  screenBirth.setAttribute('aria-hidden', 'false');
});

// Auto-advance from day to month
dayInput.addEventListener('input', () => {
  if (dayInput.value.length >= 2) monthInput.focus();
});

// Auto-advance from month to year
monthInput.addEventListener('change', () => {
  yearInput.focus();
});

/* ===== PWA INSTALL PROMPT ===== */
let deferredPrompt;
const installPrompt = document.getElementById('installPrompt');
const btnInstall = document.getElementById('btnInstall');
const btnDismiss = document.getElementById('btnDismiss');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installPrompt.classList.add('visible');
});

btnInstall.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
  installPrompt.classList.remove('visible');
});

btnDismiss.addEventListener('click', () => {
  installPrompt.classList.remove('visible');
});
